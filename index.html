<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NY Yankees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0C2340;
      --navy-mid:   #112a4f;
      --navy-light: #1a3a6a;
      --navy-card:  #0e1e36;
      --accent:     #FFFFFF;
      --accent-dim: rgba(255,255,255,0.75);
      --white:      #FFFFFF;
      --silver:     #a8b8c8;
      --muted:      #5c7080;
      --win:        #4caf87;
      --loss:       #e05c5c;
      --border:     rgba(255,255,255,0.09);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── PINSTRIPE HEADER ── */
    .site-header {
      position: relative;
      background: var(--navy);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      overflow: hidden;
    }

    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,0.04) 28px,
        rgba(255,255,255,0.04) 30px
      );
      pointer-events: none;
    }

    .site-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .hat-icon {
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 2px 16px rgba(255,255,255,0.2));
    }

    .site-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white);
    }

    .site-title span {
      color: var(--white);
      text-shadow: 0 0 30px rgba(255,255,255,0.35);
    }

    .site-date {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    .card-header-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .card-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-body { padding: 1.25rem; }

    /* ── MATCHUP ── */
    .matchup {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .team { text-align: center; }

    .team-abbr {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .team-abbr.nyy { color: var(--white); }
    .team-abbr.opp { color: var(--silver); }

    .team-full {
      font-size: 0.7rem;
      color: var(--silver);
      margin-top: 0.2rem;
      font-weight: 500;
    }

    .team-record {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.15rem;
      font-family: 'Oswald', sans-serif;
      letter-spacing: 0.05em;
    }

    /* centre column — VS or score */
    .vs-col { text-align: center; }

    .vs-text {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .score-digit {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(2.4rem, 9vw, 3.2rem);
      font-weight: 700;
      line-height: 1;
      color: var(--white);
    }

    .score-dash {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      color: var(--muted);
      font-weight: 400;
      padding: 0 0.1rem;
    }

    /* status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      font-size: 0.7rem;
      font-family: 'Oswald', sans-serif;
      letter-spacing: 0.1em;
      font-weight: 600;
      text-transform: uppercase;
      margin: 0.5rem auto 0;
    }

    .status-pill.live {
      background: rgba(76,175,87,0.12);
      border: 1px solid rgba(76,175,87,0.3);
      color: #4caf57;
    }

    .status-pill.final {
      background: rgba(96,125,139,0.12);
      border: 1px solid rgba(96,125,139,0.25);
      color: var(--muted);
    }

    .status-pill.scheduled {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--accent);
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf57;
      animation: livepulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes livepulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── META GRID ── */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-top: 1rem;
    }

    .meta-cell {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
    }

    .meta-cell.full { grid-column: 1 / -1; }

    .meta-key {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .meta-val {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.3;
    }

    .broadcast-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .broadcast-link:active { opacity: 0.7; }

    /* ── PITCHERS ── */
    .pitchers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .pitcher-cell {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }

    .pitcher-team-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .pitcher-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }

    .pitcher-note {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── LAST 10 ── */
    .streak-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 1rem;
      align-items: center;
    }

    .streak-pip {
      flex: 1;
      height: 6px;
      border-radius: 999px;
    }

    .streak-pip.W { background: var(--win); }
    .streak-pip.L { background: var(--loss); }

    .streak-record {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--silver);
      margin-left: 0.5rem;
      white-space: nowrap;
    }

    .game-list { display: flex; flex-direction: column; gap: 2px; }

    .game-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      transition: background 0.15s;
    }

    .game-row:hover { background: rgba(255,255,255,0.03); }

    .result-pill {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      width: 1.8rem;
      height: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .result-pill.W { background: rgba(76,175,135,0.15); color: var(--win); border: 1px solid rgba(76,175,135,0.25); }
    .result-pill.L { background: rgba(224,92,92,0.12);  color: var(--loss); border: 1px solid rgba(224,92,92,0.2); }

    .game-opp {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--silver);
    }

    .game-score-val {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .game-date-val {
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 3.5rem;
      text-align: right;
    }

    /* ── SEASON STAT BAR ── */
    .stat-bar {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.85rem;
    }

    .stat-chip {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--silver);
    }

    .stat-chip strong {
      color: var(--white);
      font-weight: 600;
    }

    /* ── STANDINGS TABLE ── */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
    }

    .standings-table th {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 600;
      padding: 0 0.5rem 0.65rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }

    .standings-table th:first-child { text-align: left; padding-left: 0; }

    .standings-table td {
      font-size: 0.85rem;
      padding: 0.6rem 0.5rem;
      text-align: right;
      color: var(--silver);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-variant-numeric: tabular-nums;
    }

    .standings-table td:first-child {
      text-align: left;
      padding-left: 0;
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.03em;
    }

    .standings-table tr.yankees-row td {
      color: var(--white);
      font-weight: 600;
    }

    .standings-table tr.yankees-row td:first-child {
      color: var(--white);
    }

    .standings-table tr:last-child td { border-bottom: none; }

    .gb-dash { color: var(--muted); }

    /* ── UPCOMING GAMES ── */
    .upcoming-list { display: flex; flex-direction: column; gap: 2px; }

    .upcoming-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      transition: background 0.15s;
    }

    .upcoming-row:hover { background: rgba(255,255,255,0.03); }

    .upcoming-date {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 3.2rem;
      letter-spacing: 0.05em;
    }

    .upcoming-ha {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      flex-shrink: 0;
    }

    .upcoming-opp {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--silver);
    }

    .upcoming-time {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }
    .state-box {
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .spinner {
      width: 2.2rem; height: 2.2rem;
      border: 3px solid rgba(255,255,255,0.09);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-text {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .error-box {
      background: rgba(224,92,92,0.08);
      border: 1px solid rgba(224,92,92,0.25);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
      color: var(--loss);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      padding: 0 1rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="hat-icon">🗽</div>
    <div class="site-title">New York <span>Yankees</span></div>
    <div class="site-date" id="today-label"></div>
    <div class="stat-bar" id="stat-bar"></div>
  </header>

  <div class="container" id="app">
    <div class="card">
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-text">Loading game data…</div>
      </div>
    </div>
  </div>

  <footer class="site-footer">MLB Stats API &nbsp;·&nbsp; Live data</footer>

  <script>
    const YANKEES_ID = 147;

    // Set date label
    document.getElementById('today-label').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

    function fmt(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtTime(datetime) {
      return new Date(datetime).toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit', timeZoneName: 'short'
      });
    }

    async function fetchJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    }

    async function getTodayGame() {
      const today = new Date().toISOString().slice(0, 10);
      const data = await fetchJSON(
        `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${YANKEES_ID}&date=${today}&hydrate=probablePitcher,broadcasts,linescore,team(record)`
      );
      const dates = data.dates || [];
      return dates.length && dates[0].games.length ? dates[0].games[0] : null;
    }

    async function getLast10() {
      const end = new Date(); end.setDate(end.getDate() - 1);
      const start = new Date(); start.setDate(start.getDate() - 30);
      const data = await fetchJSON(
        `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${YANKEES_ID}` +
        `&startDate=${start.toISOString().slice(0,10)}&endDate=${end.toISOString().slice(0,10)}&hydrate=linescore`
      );
      const games = [];
      for (const d of (data.dates || []).reverse()) {
        for (const g of d.games.reverse()) {
          if (g.status.abstractGameState === 'Final') {
            games.push(g);
            if (games.length === 10) return games;
          }
        }
      }
      return games;
    }

    const BROADCAST_URLS = {
      'YES':         'https://yesnetwork.com/live',
      'YES Network': 'https://yesnetwork.com/live',
      'MLB.TV':      'https://www.mlb.com/tv',
      'ESPN':        'https://www.espn.com/watch',
      'ESPN+':       'https://plus.espn.com',
      'ESPN2':       'https://www.espn.com/watch',
      'Fox':         'https://www.foxsports.com/live',
      'FS1':         'https://www.foxsports.com/live',
      'TBS':         'https://www.tbs.com/watchtbs',
      'Apple TV+':   'https://tv.apple.com',
      'Peacock':     'https://www.peacocktv.com',
      'Amazon':      'https://www.amazon.com/primevideo',
      'Prime Video': 'https://www.amazon.com/primevideo',
      'NBC Sports':  'https://www.nbcsports.com',
      'NESN':        'https://nesn.com',
      'MLBN':        'https://www.mlb.com/network',
      'MLB Network': 'https://www.mlb.com/network',
    };

    const RADIO_URLS = {
      // WFAN — opens Audacy app if installed
      'WFAN':              'https://audacy.com/wfan',
      'WFAN 660':          'https://audacy.com/wfan',
      'WFAN 101.9':        'https://audacy.com/wfan',
      // ESPN Radio — opens ESPN app if installed
      'ESPN Radio':        'https://www.espn.com/radio',
      'ESPN Deportes':     'https://www.espndeportes.com/radio',
      // SiriusXM — opens SiriusXM app if installed
      'SiriusXM':          'https://siriusxm.com/player/channel-linear/entity/21fd583e-8f6a-b869-4f75-9e8a3f604eb0',
      'MLB Network Radio': 'https://siriusxm.com/player/channel-linear/entity/21fd583e-8f6a-b869-4f75-9e8a3f604eb0',
      // iHeartRadio fallback — opens iHeart app
      'WCBS':              'https://www.iheart.com/live/wcbs-880-452/',
      'WABC':              'https://www.iheart.com/live/wabc-770-am-452/',
    };

    function abbr(name) {
      const map = {
        'New York Yankees':'NYY','Boston Red Sox':'BOS','Tampa Bay Rays':'TB',
        'Baltimore Orioles':'BAL','Toronto Blue Jays':'TOR','Houston Astros':'HOU',
        'Texas Rangers':'TEX','Seattle Mariners':'SEA','Los Angeles Angels':'LAA',
        'Oakland Athletics':'OAK','Chicago White Sox':'CWS','Cleveland Guardians':'CLE',
        'Detroit Tigers':'DET','Kansas City Royals':'KC','Minnesota Twins':'MIN',
        'New York Mets':'NYM','Philadelphia Phillies':'PHI','Atlanta Braves':'ATL',
        'Miami Marlins':'MIA','Washington Nationals':'WSH','Los Angeles Dodgers':'LAD',
        'San Francisco Giants':'SF','San Diego Padres':'SD','Colorado Rockies':'COL',
        'Arizona Diamondbacks':'ARI','Chicago Cubs':'CHC','Milwaukee Brewers':'MIL',
        'St. Louis Cardinals':'STL','Cincinnati Reds':'CIN','Pittsburgh Pirates':'PIT',
      };
      return map[name] || name.split(' ').pop().slice(0,3).toUpperCase();
    }

    function buildGameCard(game) {
      if (!game) {
        return `<div class="card"><div class="state-box"><div class="state-text">No Yankees game scheduled today.</div></div></div>`;
      }

      const isHome   = game.teams.home.team.id === YANKEES_ID;
      const yankTeam = isHome ? game.teams.home : game.teams.away;
      const oppTeam  = isHome ? game.teams.away : game.teams.home;
      const oppName  = oppTeam.team.name;
      const oppAbbr  = abbr(oppName);

      const rec      = t => { const r = t.leagueRecord || t.team?.record?.leagueRecord; return r ? `${r.wins}–${r.losses}` : ''; };
      const yankRec  = rec(yankTeam);
      const oppRec   = rec(oppTeam);

      const state   = game.status.abstractGameState;
      const isLive  = state === 'Live';
      const isFinal = state === 'Final';
      const ls      = game.linescore || {};

      const homeRuns = ls.teams?.home?.runs ?? (isHome ? yankTeam.score : oppTeam.score) ?? 0;
      const awayRuns = ls.teams?.away?.runs ?? (!isHome ? yankTeam.score : oppTeam.score) ?? 0;
      const yankRuns = isHome ? homeRuns : awayRuns;
      const oppRuns  = isHome ? awayRuns : homeRuns;

      const centerCol = (isLive || isFinal)
        ? `<div class="score-display">
             <div class="score-digit">${isHome ? oppRuns : yankRuns}</div>
             <div class="score-dash">–</div>
             <div class="score-digit">${isHome ? yankRuns : oppRuns}</div>
           </div>`
        : `<div class="vs-text">VS</div>`;

      const statusPill = isLive
        ? `<div class="status-pill live"><div class="live-dot"></div>${ls.inningHalf === 'Bottom' ? '▼' : '▲'} ${ls.currentInningOrdinal || ''} &nbsp;·&nbsp; ${ls.outs ?? 0} out${ls.outs === 1 ? '' : 's'}</div>`
        : isFinal
          ? `<div class="status-pill final">Final</div>`
          : `<div class="status-pill scheduled">${fmtTime(game.gameDate)}</div>`;

      const allBroadcasts = game.broadcasts || [];
      const RADIO_TYPES = new Set(['AM', 'FM', 'XM', 'Radio']);
      const tvBroadcasts    = allBroadcasts.filter(b => b.name && !RADIO_TYPES.has(b.type));
      const radioBroadcasts = allBroadcasts.filter(b => b.name && RADIO_TYPES.has(b.type));

      const renderLinks = (list, urlMap) => list.length
        ? list.map(b => {
            const url = Object.entries(urlMap).find(([k]) => b.name.includes(k))?.[1];
            return url ? `<a href="${url}" class="broadcast-link">${b.name}</a>` : `<span>${b.name}</span>`;
          }).join('<span style="color:var(--muted)"> · </span>')
        : null;

      const tvLinks = renderLinks(tvBroadcasts, BROADCAST_URLS) || 'TBD';

      // SiriusXM covers every MLB game — always show it
      const siriusLink = `<a href="https://siriusxm.com/player/channel-linear/entity/21fd583e-8f6a-b869-4f75-9e8a3f604eb0" class="broadcast-link">SiriusXM Yankees</a>`;
      const apiRadioLinks = renderLinks(radioBroadcasts, RADIO_URLS);
      const radioLinks = apiRadioLinks ? `${siriusLink}<span style="color:var(--muted)"> · </span>${apiRadioLinks}` : siriusLink;

      const venue    = game.venue?.name || '—';
      const homeAway = isHome ? 'Home' : 'Away';

      const pitcher = (p, label) => p
        ? `<div class="pitcher-cell">
             <div class="pitcher-team-label">${label}</div>
             <div class="pitcher-name">${p.fullName}</div>
             ${p.note ? `<div class="pitcher-note">${p.note}</div>` : ''}
           </div>`
        : `<div class="pitcher-cell">
             <div class="pitcher-team-label">${label}</div>
             <div class="pitcher-name" style="color:var(--muted)">TBD</div>
           </div>`;

      const yankeeTeamDiv = `
              <div class="team">
                <div class="team-abbr nyy">NYY</div>
                <div class="team-full">New York Yankees</div>
                <div class="team-record">${yankRec}</div>
              </div>`;
      const oppTeamDiv = `
              <div class="team">
                <div class="team-abbr opp">${oppAbbr}</div>
                <div class="team-full">${oppName}</div>
                <div class="team-record">${oppRec}</div>
              </div>`;
      const leftTeam  = isHome ? oppTeamDiv  : yankeeTeamDiv;
      const rightTeam = isHome ? yankeeTeamDiv : oppTeamDiv;

      return `
        <div class="card">
          <div class="card-header"><div class="card-header-dot"></div><div class="card-label">Today's Game</div></div>
          <div class="card-body">
            <div class="matchup">
              ${leftTeam}
              <div class="vs-col">
                ${centerCol}
                ${statusPill}
              </div>
              ${rightTeam}
            </div>
            <div class="meta-grid">
              <div class="meta-cell">
                <div class="meta-key">First Pitch</div>
                <div class="meta-val">${fmtTime(game.gameDate)}</div>
              </div>
              <div class="meta-cell">
                <div class="meta-key">Venue</div>
                <div class="meta-val">${homeAway} · ${venue}</div>
              </div>
              <div class="meta-cell full">
                <div class="meta-key">Watch</div>
                <div class="meta-val" style="display:flex;flex-wrap:wrap;gap:0.3rem 0.6rem;">${tvLinks}</div>
              </div>
              <div class="meta-cell full">
                <div class="meta-key">Listen</div>
                <div class="meta-val" style="display:flex;flex-wrap:wrap;gap:0.3rem 0.6rem;">${radioLinks}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-header-dot"></div><div class="card-label">Starting Pitchers</div></div>
          <div class="card-body">
            <div class="pitchers-grid">
              ${pitcher(yankTeam.probablePitcher, 'Yankees')}
              ${pitcher(oppTeam.probablePitcher, oppName)}
            </div>
          </div>
        </div>`;
    }

    function buildLast10Card(games) {
      if (!games.length) {
        return `<div class="card"><div class="state-box"><div class="state-text">No recent game data.</div></div></div>`;
      }

      let wins = 0, losses = 0;
      const rows = games.map(g => {
        const isHome  = g.teams.home.team.id === YANKEES_ID;
        const yankT   = isHome ? g.teams.home : g.teams.away;
        const oppT    = isHome ? g.teams.away : g.teams.home;
        const won     = yankT.isWinner;
        const R       = won ? 'W' : 'L';
        won ? wins++ : losses++;
        return `
          <div class="game-row">
            <div class="result-pill ${R}">${R}</div>
            <div class="game-opp">${isHome ? 'vs' : '@'} ${oppT.team.name}</div>
            <div class="game-score-val">${yankT.score ?? 0}–${oppT.score ?? 0}</div>
            <div class="game-date-val">${fmt(g.officialDate || g.gameDate?.slice(0,10))}</div>
          </div>`;
      });

      const pips = games.map(g => {
        const isHome = g.teams.home.team.id === YANKEES_ID;
        const won    = (isHome ? g.teams.home : g.teams.away).isWinner;
        return `<div class="streak-pip ${won ? 'W' : 'L'}"></div>`;
      }).join('');

      return `
        <div class="card">
          <div class="card-header"><div class="card-header-dot"></div><div class="card-label">Last 10 Games</div></div>
          <div class="card-body">
            <div class="streak-bar">${pips}<span class="streak-record">${wins}–${losses}</span></div>
            <div class="game-list">${rows.join('')}</div>
          </div>
        </div>`;
    }

    async function getUpcoming() {
      const start = new Date(); start.setDate(start.getDate() + 1);
      const end   = new Date(); end.setDate(end.getDate() + 14);
      const data  = await fetchJSON(
        `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${YANKEES_ID}` +
        `&startDate=${start.toISOString().slice(0,10)}&endDate=${end.toISOString().slice(0,10)}`
      );
      const games = [];
      for (const d of (data.dates || [])) {
        for (const g of d.games) {
          if (g.status.abstractGameState !== 'Final') {
            games.push(g);
            if (games.length === 5) return games;
          }
        }
      }
      return games;
    }

    async function getStandings() {
      // AL East division ID = 201
      const year = new Date().getFullYear();
      const data = await fetchJSON(
        `https://statsapi.mlb.com/api/v1/standings?leagueId=103&season=${year}&standingsTypes=regularSeason&hydrate=team`
      );
      const alEast = (data.records || []).find(r => r.division?.id === 201);
      return alEast?.teamRecords || [];
    }

    function buildUpcomingCard(games) {
      if (!games.length) return '';
      const rows = games.map(g => {
        const isHome  = g.teams.home.team.id === YANKEES_ID;
        const oppTeam = isHome ? g.teams.away : g.teams.home;
        const date    = new Date(g.gameDate);
        const dateStr = date.toLocaleDateString('en-US', { month:'short', day:'numeric' });
        const timeStr = date.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
        return `
          <div class="upcoming-row">
            <div class="upcoming-date">${dateStr}</div>
            <div class="upcoming-ha">${isHome ? 'vs' : '@'}</div>
            <div class="upcoming-opp">${oppTeam.team.name}</div>
            <div class="upcoming-time">${timeStr}</div>
          </div>`;
      });
      return `
        <div class="card">
          <div class="card-header"><div class="card-header-dot"></div><div class="card-label">Upcoming Games</div></div>
          <div class="card-body" style="padding:0.75rem 0.5rem">
            <div class="upcoming-list">${rows.join('')}</div>
          </div>
        </div>`;
    }

    function buildStandingsCard(teams) {
      if (!teams.length) return '';
      const sorted = [...teams].sort((a,b) => a.divisionRank - b.divisionRank);
      const rows = sorted.map(t => {
        const isYankees = t.team.id === YANKEES_ID;
        const gb = t.gamesBack === '-' ? '<span class="gb-dash">—</span>' : t.gamesBack;
        const pct = parseFloat(t.winningPercentage).toFixed(3).replace(/^0/, '');
        return `
          <tr class="${isYankees ? 'yankees-row' : ''}">
            <td>${isYankees ? '★ ' : ''}${abbr(t.team.name)}</td>
            <td>${t.wins}</td>
            <td>${t.losses}</td>
            <td>${pct}</td>
            <td>${gb}</td>
          </tr>`;
      });
      return `
        <div class="card">
          <div class="card-header"><div class="card-header-dot"></div><div class="card-label">AL East Standings</div></div>
          <div class="card-body">
            <table class="standings-table">
              <thead>
                <tr>
                  <th>Team</th>
                  <th>W</th>
                  <th>L</th>
                  <th>PCT</th>
                  <th>GB</th>
                </tr>
              </thead>
              <tbody>${rows.join('')}</tbody>
            </table>
          </div>
        </div>`;
    }

    function injectStatBar(todayGame) {
      // Pull record from today's game data if available
      const yankTeam = todayGame
        ? (todayGame.teams.home.team.id === YANKEES_ID ? todayGame.teams.home : todayGame.teams.away)
        : null;
      const rec = yankTeam?.leagueRecord || yankTeam?.team?.record?.leagueRecord;
      if (!rec) return;
      const w = rec.wins, l = rec.losses;
      const pct = (w / (w + l || 1)).toFixed(3).replace(/^0/, '');
      document.getElementById('stat-bar').innerHTML = `
        <div class="stat-chip"><strong>${w}–${l}</strong> Record</div>
        <div class="stat-chip"><strong>${pct}</strong> Win %</div>`;
    }

    let refreshTimer = null;

    async function main() {
      const app = document.getElementById('app');
      try {
        const [todayGame, last10, upcoming, standings] = await Promise.all([
          getTodayGame(), getLast10(), getUpcoming(), getStandings()
        ]);
        injectStatBar(todayGame);
        app.innerHTML =
          buildGameCard(todayGame) +
          buildUpcomingCard(upcoming) +
          buildLast10Card(last10) +
          buildStandingsCard(standings);
        if (todayGame?.status.abstractGameState === 'Live') {
          clearTimeout(refreshTimer);
          refreshTimer = setTimeout(main, 30000);
        }
      } catch (err) {
        app.innerHTML = `<div class="error-box">Failed to load game data: ${err.message}<br>Check your connection and reload.</div>`;
      }
    }

    main();
  </script>
</body>
</html>
